# Nginx configuration for port 8080 - alternative access

events {
    worker_connections 1024;
}

http {
    upstream nextjs_frontend {
        server 127.0.0.1:3001;
        keepalive 64;
    }

    server {
        listen 8080;
        listen [::]:8080;
        server_name _;

        # Logging to accessible locations
        access_log /tmp/nginx-port8080-access.log;
        error_log /tmp/nginx-port8080-error.log;

        # Client body size limit (for file uploads)
        client_max_body_size 10M;
        client_body_buffer_size 128k;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Media uploads (static files)
        location /uploads/ {
            alias /home/codecrafter/combined/website/backend/uploads/;
            expires 30d;
            add_header Cache-Control "public";
            
            # Security: prevent execution of uploaded files
            location ~* \.(php|pl|py|jsp|asp|sh|cgi)$ {
                deny all;
            }
        }

        # Next.js static assets
        location /_next/static/ {
            proxy_pass http://nextjs_frontend/_next/static/;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, immutable";
        }

        # Next.js public assets
        location /static/ {
            proxy_pass http://nextjs_frontend/static/;
            proxy_cache_valid 200 30d;
            add_header Cache-Control "public";
        }

        # Main Next.js application (catch-all)
        location / {
            proxy_pass http://nextjs_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Next.js specific headers
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
